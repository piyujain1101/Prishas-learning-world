<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6C5CE7">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦕</text></svg>">
    <title>Sound Safari - Learning World 🦕</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/phonics.css">
    <link rel="stylesheet" href="css/matching.css">
    <link rel="stylesheet" href="css/sound-safari.css">
</head>
<body>
    <!-- Back Button -->
    <button class="back-button" onclick="navigateTo('phonics.html')">🏠</button>

    <!-- Star Counter -->
    <div class="star-counter" id="star-counter">⭐ 0</div>

    <div id="app">
        <!-- Safari Intro Screen -->
        <div id="safari-intro" class="screen active">
            <div class="stars-bg"></div>

            <div class="intro-content">
                <div class="intro-mascot">🦕</div>
                <h1 class="intro-title">Sound Safari!</h1>
                <p class="intro-desc">
                    Listen to the sound and find<br>
                    the <strong>right letter!</strong><br>
                    Use your ears! 👂
                </p>

                <div class="safari-demo">
                    <div class="demo-sound">🔊 "bah"</div>
                    <div class="demo-arrow">→</div>
                    <div class="demo-letter">B</div>
                </div>

                <button class="big-button btn-primary" onclick="startSafari()">
                    Start Safari! 🦕
                </button>

                <div class="intro-difficulty">
                    <p class="diff-label">Choose difficulty:</p>
                    <div class="diff-buttons">
                        <button class="diff-btn active" id="safari-diff-easy" onclick="setSafariDifficulty('easy')">
                            🌟 Easy<br><small>3 choices</small>
                        </button>
                        <button class="diff-btn" id="safari-diff-medium" onclick="setSafariDifficulty('medium')">
                            ⭐ Medium<br><small>4 choices</small>
                        </button>
                        <button class="diff-btn" id="safari-diff-hard" onclick="setSafariDifficulty('hard')">
                            🏆 Hard<br><small>5 choices</small>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Safari Game Screen -->
        <div id="safari-game" class="screen">
            <!-- Round Progress -->
            <div class="game-progress">
                <div class="game-progress-bar">
                    <div class="game-progress-fill" id="safari-progress-fill"></div>
                </div>
                <div class="game-round-text" id="safari-round-text">Round 1 of 10</div>
            </div>

            <!-- Dino Prompt -->
            <div class="game-prompt">
                <div class="prompt-dino">🦕</div>
                <div class="prompt-text" id="safari-prompt-text">What letter makes this sound?</div>
            </div>

            <!-- Sound Player -->
            <div class="sound-player-container">
                <button class="sound-player-btn" id="safari-play-btn" onclick="replaySound()">
                    <div class="sound-player-icon">🔊</div>
                    <div class="sound-player-label">Tap to hear</div>
                </button>
                <div class="sound-waves" id="sound-waves">
                    <div class="wave"></div>
                    <div class="wave"></div>
                    <div class="wave"></div>
                </div>
            </div>

            <!-- Letter Choices -->
            <div class="safari-choices" id="safari-choices">
                <!-- Generated dynamically -->
            </div>

            <!-- Feedback Area -->
            <div class="feedback-area" id="safari-feedback"></div>

            <!-- Teaching Moment (shown after answer) -->
            <div class="teaching-moment" id="teaching-moment"></div>

            <!-- Score -->
            <div class="game-score">
                <span class="score-correct" id="safari-score-correct">✅ 0</span>
                <span class="score-wrong" id="safari-score-wrong">❌ 0</span>
            </div>
        </div>

        <!-- Safari Results Screen -->
        <div id="safari-results" class="screen">
            <div class="stars-bg"></div>

            <div class="results-content">
                <div class="results-mascot" id="safari-results-mascot">🦕</div>
                <h1 class="results-title" id="safari-results-title">Great Job!</h1>
                <div class="results-score">
                    <div class="results-stars-display" id="safari-results-stars"></div>
                    <p class="results-text" id="safari-results-text"></p>
                </div>

                <div class="results-review" id="safari-results-review"></div>

                <div class="results-buttons">
                    <button class="big-button btn-primary" onclick="startSafari()">
                        Play Again! 🔄
                    </button>
                    <button class="big-button btn-secondary" onclick="navigateTo('phonics.html')">
                        Back to Phonics 📋
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/speech.js"></script>
    <script src="js/sound-safari.js"></script>
</body>
</html>
